{% extends 'base.html' %}
{% block content %}
<div class="container my-5">
    <div class="row g-4">
        <div class="col-lg-7">
            <div class="bg-white p-4 rounded shadow-sm h-100 border-top border-success border-4">
                <h4 class="fw-bold text-success mb-3">Official Communication Desk</h4>
                <form onsubmit="alert('Message token generated successfully.'); return false;">
                    <div class="row g-3">
                        <div class="col-md-6"><label class="form-label small fw-bold">Full Name</label><input type="text" class="form-control" required></div>
                        <div class="col-md-6"><label class="form-label small fw-bold">Email Address</label><input type="email" class="form-control" required></div>
                        <div class="col-12"><label class="form-label small fw-bold">Message Text</label><textarea class="form-control" rows="5" required></textarea></div>
                        <div class="col-12"><button type="submit" class="btn btn-success fw-bold px-4" style="background: #005A2B;">Send Query</button></div>
                    </div>
                </form>
            </div>
        </div>
        <div class="col-lg-5">
            <div class="bg-white p-4 rounded shadow-sm h-100 border-top border-warning border-4">
                <h4 class="fw-bold text-dark mb-3">Headquarters Location</h4>
                <p class="text-muted small mb-3"><i class="fa-solid fa-location-dot me-1"></i> ZABTech Sector HQ, Hyderabad, Sindh, Pakistan.</p>
                <div class="rounded overflow-hidden shadow-sm border" style="height: 300px;">
                    <iframe src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3604.6461971755146!2d68.36151747614488!3d25.38318357759089!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x394c70bd4bf9f2b3%3A0xc3cf3fbdfc234b3f!2sSZABIST%20ZABTech%20Hyderabad!5e0!3m2!1sen!2spk!4v1718420000000!5m2!1sen!2spk" 
                            width="100%" height="100%" style="border:0;" allowfullscreen="" loading="lazy" referrerpolicy="no-referrer-when-downgrade"></iframe>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
